services:
  dev:
    build: .
    volumes:
      - .:/app

    working_dir: /app

    stdin_open: true
    tty: true

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]